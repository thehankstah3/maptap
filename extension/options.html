<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>MapTap Score Logger</title>
<style>
  body { font-family: -apple-system, sans-serif; padding: 14px; width: 240px; font-size: 13px; }
  h3 { margin: 0 0 10px; font-size: 14px; }
  label { display: block; margin-bottom: 10px; }
  input { width: 100%; box-sizing: border-box; padding: 6px; margin-top: 4px; }
  button { width: 100%; padding: 7px; cursor: pointer; }
  #status { margin-top: 8px; color: #16a34a; min-height: 14px; }
</style>
</head>
<body>
  <h3>MapTap Score Logger</h3>
  <label>Player name
    <input id="playerName" type="text" placeholder="Henry Howe">
  </label>
  <label>Chats (comma-separated)
    <input id="chats" type="text" placeholder="Tappers, Howes">
  </label>
  <label>API key
    <input id="apiKey" type="password">
  </label>
  <button id="save">Save</button>
  <div id="status"></div>
  <script src="options.js"></script>
</body>
</html>
